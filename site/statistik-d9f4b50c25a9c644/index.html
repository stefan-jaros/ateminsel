<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ateminsel – Statistik</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; padding: 24px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; color: #006d8a; }
        h2 { font-size: 1.1rem; font-weight: 600; margin: 32px 0 12px; color: #333; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
        .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .big-number { font-size: 2.5rem; font-weight: 700; color: #006d8a; }
        .big-label { font-size: 0.85rem; color: #888; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-box { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #006d8a; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; padding: 8px 12px; border-bottom: 2px solid #eee; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .bar-cell { width: 40%; }
        .bar { height: 20px; background: #006d8a; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
        .bar-lang { background: #00b8e6; }
        .pct { color: #888; font-size: 0.8rem; margin-left: 8px; }
        .monat-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: #fff; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .empty { text-align: center; color: #888; padding: 40px; font-style: italic; }
        .section-names { font-weight: 500; }
        @media (max-width: 600px) { body { padding: 16px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <div>
            <h1>Statistik</h1>
            <p class="subtitle">Besucherstatistik ateminsel.ch</p>
        </div>
        <select class="monat-select" id="monat-select" onchange="zeigMonat(this.value)"></select>
    </div>

    <div id="inhalt"><p class="empty">Daten werden geladen...</p></div>
</div>

<script>
const API = '../track.php';
const SECTION_NAMES = {
    'hero': 'Startseite (Hero)',
    'weshalb': 'Weshalb Atemtherapie',
    'ueber-mich': 'Ueber mich',
    'angebot': 'Angebot & Kurse',
    'buchen': 'Termin buchen',
    'kontakt': 'Kontakt'
};
const SECTION_ORDER = ['hero', 'weshalb', 'ueber-mich', 'angebot', 'buchen', 'kontakt'];
const LANG_NAMES = { de: 'Deutsch', en: 'English', fr: 'Français', es: 'Español' };

let alleStats = {};

fetch(API)
    .then(r => r.json())
    .then(data => {
        alleStats = data.stats || {};
        const monate = Object.keys(alleStats).sort().reverse();
        const select = document.getElementById('monat-select');

        if (monate.length === 0) {
            document.getElementById('inhalt').innerHTML = '<p class="empty">Noch keine Daten vorhanden. Statistiken werden ab dem ersten Besuch erfasst.</p>';
            return;
        }

        select.innerHTML = monate.map(m => {
            const [j, mo] = m.split('-');
            const namen = ['', 'Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
            return '<option value="' + m + '">' + namen[parseInt(mo)] + ' ' + j + '</option>';
        }).join('');

        zeigMonat(monate[0]);
    })
    .catch(() => {
        document.getElementById('inhalt').innerHTML = '<p class="empty">Fehler beim Laden der Daten.</p>';
    });

function zeigMonat(monat) {
    const s = alleStats[monat];
    if (!s) return;

    const besuche = s.besuche || 0;
    const sprachen = s.sprachen || {};
    const sektionen = s.sektionen || {};
    const maxSek = Math.max(...SECTION_ORDER.map(id => sektionen[id] || 0), 1);
    const maxLang = Math.max(...Object.values(sprachen), 1);

    let html = '';

    // Gesamtzahl
    html += '<div class="stats-grid">';
    html += '<div class="stat-box"><div class="stat-number">' + besuche + '</div><div class="stat-label">Besuche gesamt</div></div>';
    Object.keys(LANG_NAMES).forEach(l => {
        if (sprachen[l]) {
            html += '<div class="stat-box"><div class="stat-number">' + sprachen[l] + '</div><div class="stat-label">' + LANG_NAMES[l] + '</div></div>';
        }
    });
    html += '</div>';

    // Scroll-Tiefe / Sektionen
    html += '<div class="card">';
    html += '<h2>Sektionen (wie weit wurde gescrollt)</h2>';
    html += '<table><tr><th>Bereich</th><th>Aufrufe</th><th class="bar-cell"></th></tr>';
    SECTION_ORDER.forEach(id => {
        const n = sektionen[id] || 0;
        const pct = besuche > 0 ? Math.round(n / besuche * 100) : 0;
        const w = Math.round(n / maxSek * 100);
        html += '<tr>';
        html += '<td class="section-names">' + (SECTION_NAMES[id] || id) + '</td>';
        html += '<td>' + n + '<span class="pct">(' + pct + '%)</span></td>';
        html += '<td class="bar-cell"><div class="bar" style="width:' + w + '%"></div></td>';
        html += '</tr>';
    });
    html += '</table></div>';

    // Sprachen-Details
    html += '<div class="card">';
    html += '<h2>Sprachen</h2>';
    html += '<table><tr><th>Sprache</th><th>Besuche</th><th class="bar-cell"></th></tr>';
    Object.entries(sprachen).sort((a, b) => b[1] - a[1]).forEach(([l, n]) => {
        const pct = besuche > 0 ? Math.round(n / besuche * 100) : 0;
        const w = Math.round(n / maxLang * 100);
        html += '<tr>';
        html += '<td class="section-names">' + (LANG_NAMES[l] || l) + '</td>';
        html += '<td>' + n + '<span class="pct">(' + pct + '%)</span></td>';
        html += '<td class="bar-cell"><div class="bar bar-lang" style="width:' + w + '%"></div></td>';
        html += '</tr>';
    });
    html += '</table></div>';

    document.getElementById('inhalt').innerHTML = html;
}
</script>

</body>
</html>
